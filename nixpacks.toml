[phases.setup]
nixPkgs = ["php82", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.pdo", "php82Extensions.tokenizer", "php82Extensions.zip", "php82Extensions.fileinfo", "composer"]

[phases.build]
cmds = ["composer install --no-dev", "npm install", "npm run build"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"